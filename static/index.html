<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Server Monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <div class="max-w-7xl mx-auto p-4 space-y-4">
    <h1 class="text-2xl font-bold">🖥️ Advanced Server Monitoring Panel</h1>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="cards"></div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <div class="bg-white rounded-xl border p-3">
        <h2 class="font-semibold mb-2">Containers (Realtime + Actions)</h2>
        <div class="overflow-auto max-h-[520px]">
          <table class="w-full text-sm" id="containersTable"></table>
        </div>
      </div>

      <div class="bg-white rounded-xl border p-3" id="logsPanel">
        <div class="flex flex-wrap items-center justify-between mb-2 gap-2">
          <h2 class="font-semibold">Live Logs</h2>
          <div class="flex items-center gap-2">
            <select id="containerSelect" class="border rounded px-2 py-1 text-sm"></select>
            <button id="fullscreenBtn" class="bg-slate-900 text-white rounded px-2 py-1 text-xs">Fullscreen</button>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-2">
          <input id="searchInput" placeholder="Search logs (text)..." class="border rounded px-2 py-1 text-sm" />
          <div class="flex flex-wrap gap-2">
            <select id="levelFilter" class="border rounded px-2 py-1 text-sm">
              <option value="all">All levels</option>
              <option value="error">Error</option>
              <option value="warn">Warn</option>
              <option value="info">Info</option>
            </select>
            <button id="pauseBtn" class="border rounded px-2 py-1 text-xs">Pause</button>
            <button id="dateBtn" class="border rounded px-2 py-1 text-xs bg-indigo-50 border-indigo-200">Date View: On</button>
            <button id="wrapBtn" class="border rounded px-2 py-1 text-xs">Wrap: Off</button>
            <button id="downloadBtn" class="border rounded px-2 py-1 text-xs">Download</button>
            <button id="clearBtn" class="border rounded px-2 py-1 text-xs">Clear View</button>
          </div>
        </div>

        <div class="text-xs text-slate-500 mb-1" id="logMeta">Ready</div>
        <div id="logs" class="bg-slate-950 text-green-300 text-xs rounded p-2 h-[520px] overflow-auto whitespace-pre font-mono"></div>
      </div>
    </div>

    <div class="bg-white rounded-xl border p-3">
      <h2 class="font-semibold mb-2">Docker Images</h2>
      <div id="images" class="text-sm"></div>
    </div>
  </div>

<script>
const fmtBytes=(b)=>{if(!b)return'0 B';const u=['B','KB','MB','GB','TB'];let i=0;while(b>=1024&&i<u.length-1){b/=1024;i++;}return b.toFixed(1)+' '+u[i]}
const cardsEl=document.getElementById('cards');
const containersTable=document.getElementById('containersTable');
const select=document.getElementById('containerSelect');
const logsEl=document.getElementById('logs');
const imagesEl=document.getElementById('images');
const logsPanel=document.getElementById('logsPanel');
const fullscreenBtn=document.getElementById('fullscreenBtn');
const searchInput=document.getElementById('searchInput');
const levelFilter=document.getElementById('levelFilter');
const pauseBtn=document.getElementById('pauseBtn');
const wrapBtn=document.getElementById('wrapBtn');
const dateBtn=document.getElementById('dateBtn');
const downloadBtn=document.getElementById('downloadBtn');
const clearBtn=document.getElementById('clearBtn');
const logMeta=document.getElementById('logMeta');

let selected='';
let fullscreen=false;
let paused=false;
let wrap=false;
let dateView=true;
let rawLogs='';

async function doAction(name, action){
  if(!confirm(`${action.toUpperCase()} ${name}?`)) return;
  const r=await fetch(`/api/container/${encodeURIComponent(name)}/action`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action})
  });
  const d=await r.json();
  if(!r.ok){ alert(d.error||'Action failed'); return; }
}

function renderCards(s){
  const m=s.server.memory,d=s.server.disk;
  const items=[
    ['CPU %', s.server.cpu_pct+'%'],
    ['Memory', `${fmtBytes(m.used)} / ${fmtBytes(m.total)} (${m.used_pct}%)`],
    ['Disk', `${fmtBytes(d.used)} / ${fmtBytes(d.total)} (${d.used_pct}%)`],
    ['Uptime', `${Math.floor(s.server.uptime_sec/3600)}h`],
    ['Containers', `${s.docker.containers_running}/${s.docker.containers_total}`],
    ['Images', s.docker.images_total],
    ['Unhealthy', s.docker.unhealthy],
  ];
  cardsEl.innerHTML=items.map(i=>`<div class='bg-white rounded-xl border p-3'><div class='text-xs text-slate-500'>${i[0]}</div><div class='font-semibold'>${i[1]}</div></div>`).join('');
}

function renderContainers(list){
  const rows=list.map(c=>{
    const health=(c.health||'-');
    return `<tr class='border-b'>
      <td class='py-1 pr-2 font-medium'>${c.name}</td>
      <td>${c.status}</td>
      <td>${health}</td>
      <td class='text-xs text-slate-500 max-w-[220px] truncate'>${c.image}</td>
      <td class='text-right whitespace-nowrap'>
        <button class='text-xs px-2 py-1 rounded border mr-1' onclick="doAction('${c.name}','start')">Start</button>
        <button class='text-xs px-2 py-1 rounded border mr-1' onclick="doAction('${c.name}','stop')">Stop</button>
        <button class='text-xs px-2 py-1 rounded bg-slate-900 text-white' onclick="doAction('${c.name}','restart')">Restart</button>
      </td>
    </tr>`;
  }).join('');

  containersTable.innerHTML=`<thead><tr class='text-left border-b'><th>Name</th><th>Status</th><th>Health</th><th>Image</th><th class='text-right'>Action</th></tr></thead><tbody>${rows}</tbody>`;

  const opts=list.map(c=>`<option value='${c.name}'>${c.name}</option>`).join('');
  select.innerHTML=opts;
  if(!selected && list.length){selected=list[0].name;select.value=selected;}
  if(selected) select.value=selected;
}

function escapeHtml(s){
  return (s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
}

function renderPlain(lines){
  logsEl.textContent='';
  const pre=document.createElement('pre');
  pre.className = wrap ? 'whitespace-pre-wrap m-0' : 'whitespace-pre m-0';
  pre.textContent=lines.join('\n');
  logsEl.appendChild(pre);
}

function applyFilters(){
  const q=(searchInput.value||'').toLowerCase();
  const level=levelFilter.value;
  let lines=(rawLogs||'').split('\n').filter(Boolean);

  if(level!=='all') lines=lines.filter(l=>l.toLowerCase().includes(level));
  if(q) lines=lines.filter(l=>l.toLowerCase().includes(q));

  if(dateView){
    const grouped={};
    for(const l of lines){
      const m=l.match(/^(\d{4}-\d{2}-\d{2})/);
      const d=m?m[1]:'Unknown Date';
      if(!grouped[d]) grouped[d]=[];
      grouped[d].push(l);
    }
    const ordered=Object.keys(grouped).sort();
    const html=ordered.map((d,i)=>{
      const block=grouped[d].map(x=>escapeHtml(x)).join('\n');
      return `<details ${i===ordered.length-1?'open':''} class="mb-2 border border-slate-800 rounded">
        <summary class="cursor-pointer px-2 py-1 bg-slate-900 text-slate-200 font-semibold">${d} <span class='text-slate-400'>(${grouped[d].length} lines)</span></summary>
        <pre class="m-0 p-2 ${wrap?'whitespace-pre-wrap':'whitespace-pre'}">${block}</pre>
      </details>`;
    }).join('');
    logsEl.innerHTML = html || '<div class="text-slate-400">No logs match current filter.</div>';
  } else {
    renderPlain(lines);
  }

  logMeta.textContent=`Lines: ${lines.length} | Raw: ${(rawLogs||'').split('\n').filter(Boolean).length} | Filter: ${level} | DateView: ${dateView?'On':'Off'}${q?` | Search: "${q}"`:''}`;
  logsEl.scrollTop=logsEl.scrollHeight;
}

async function refreshImages(){
  const r=await fetch('/api/images');
  const imgs=await r.json();
  imagesEl.innerHTML = `<div class='text-slate-500 mb-2'>Total images: ${imgs.length}</div>` + imgs.slice(0,150).map(i=>`<div class='py-1 border-b text-xs'><b>${i.tags[0]||i.id}</b> · ${fmtBytes(i.size)}</div>`).join('');
}

async function refreshLogs(){
  if(paused || !selected) return;
  const r=await fetch('/api/logs/'+encodeURIComponent(selected)+'?tail=500');
  const d=await r.json();
  rawLogs=d.logs||d.error||'';
  applyFilters();
}

select.addEventListener('change',()=>{selected=select.value;refreshLogs();});
searchInput.addEventListener('input',applyFilters);
levelFilter.addEventListener('change',applyFilters);

pauseBtn.addEventListener('click',()=>{
  paused=!paused;
  pauseBtn.textContent=paused?'Resume':'Pause';
  pauseBtn.className = paused ? 'border rounded px-2 py-1 text-xs bg-amber-100 border-amber-300' : 'border rounded px-2 py-1 text-xs';
});

dateBtn.addEventListener('click',()=>{
  dateView=!dateView;
  dateBtn.textContent=`Date View: ${dateView?'On':'Off'}`;
  dateBtn.className = dateView ? 'border rounded px-2 py-1 text-xs bg-indigo-50 border-indigo-200' : 'border rounded px-2 py-1 text-xs';
  applyFilters();
});

wrapBtn.addEventListener('click',()=>{
  wrap=!wrap;
  wrapBtn.textContent=`Wrap: ${wrap?'On':'Off'}`;
  applyFilters();
});

clearBtn.addEventListener('click',()=>{
  logsEl.textContent='';
  rawLogs='';
  logMeta.textContent='Cleared';
});

downloadBtn.addEventListener('click',()=>{
  const blob=new Blob([logsEl.textContent||''],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${selected||'container'}-logs.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
});

fullscreenBtn.addEventListener('click', ()=>{
  fullscreen=!fullscreen;
  if(fullscreen){
    logsPanel.classList.add('fixed','inset-4','z-50','shadow-2xl');
    logsPanel.classList.remove('rounded-xl');
    logsEl.style.height='calc(100vh - 210px)';
    fullscreenBtn.textContent='Exit Fullscreen';
  } else {
    logsPanel.classList.remove('fixed','inset-4','z-50','shadow-2xl');
    logsPanel.classList.add('rounded-xl');
    logsEl.style.height='520px';
    fullscreenBtn.textContent='Fullscreen';
  }
});

const wsProto=location.protocol==='https:'?'wss':'ws';
const ws=new WebSocket(`${wsProto}://${location.host}/ws`);
ws.onmessage=(ev)=>{
  const d=JSON.parse(ev.data);
  renderCards(d.summary);
  renderContainers(d.containers);
};

setInterval(refreshLogs,3000);
refreshImages();
setInterval(refreshImages,15000);
</script>
</body>
</html>
